name: Update Master Symbols

# ─── Schedule ─────────────────────────────────────────────────────────────────
# 01:00 UTC  =  06:30 IST  /  10:00 JST  (before both markets open)
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:          # manual trigger from the Actions tab

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write             # needed to commit master_symbols.json

jobs:
  update-symbols:
    name: Download symbol lists → data/master_symbols.json
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python 3.12 (no pip cache — no requirements.txt to hash) ──────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl

      # ── 4. Run the updater ────────────────────────────────────────────────────
      - name: Run update_symbols.py
        run: python scripts/update_symbols.py

      # ── 5. Commit if changed (with rebase-and-retry to handle concurrent pushes) ─
      - name: Commit master_symbols.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true

          git add data/master_symbols.json

          if git diff --staged --quiet; then
            echo "ℹ️  No changes to master_symbols.json — skipping commit."
            exit 0
          fi

          git commit -m "chore: refresh master_symbols.json [skip ci]"

          # Retry up to 3 times if remote moved between our checkout and push
          for attempt in 1 2 3; do
            echo "🔄  Push attempt $attempt/3..."
            if git push origin HEAD:main; then
              echo "✅  master_symbols.json committed and pushed."
              exit 0
            fi
            echo "⚠️  Push rejected (remote moved). Pulling and retrying..."
            git pull --rebase origin main || git rebase --abort
            sleep 5
          done
          echo "❌  All 3 push attempts failed — giving up."
          exit 1
