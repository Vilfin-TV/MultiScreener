name: Build Daily Market Data

# ─── Schedule ────────────────────────────────────────────────────────────────
# Staggered 15 min after daily_symbols.yml (01:00 UTC) to avoid git-push races.
# 01:15 UTC  =  06:45 IST  /  10:15 JST — still before both markets open.
on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:            # manual trigger from Actions tab

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  build-data:
    name: Generate Market Snapshot → data.json
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Node.js 24 (native fetch, no npm install required) ────────────────
      #    setup-node@v4.4.0+ ships with the Node 24 runner to resolve the
      #    "Node.js 20 actions are deprecated" warning.
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 3. Verify WORKER_URL secret exists before running ────────────────────
      - name: Verify WORKER_URL secret
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "❌ ERROR: WORKER_URL secret is not set."
            echo ""
            echo "To fix:"
            echo "  1. Go to your repo → Settings → Secrets and variables → Actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: WORKER_URL"
            echo "  4. Value: https://x9-k2-p30-worker.vilfintv.workers.dev"
            exit 1
          fi
          echo "✅ WORKER_URL secret is present (value hidden)."

      # ── 4. Run build script ──────────────────────────────────────────────────
      #    WORKER_URL is injected from the GitHub Secret — never written to any
      #    file that gets deployed to GitHub Pages.
      #    The script retries up to 3× with exponential back-off and writes a
      #    graceful fallback data.json instead of crashing on Worker timeouts.
      - name: Run build script
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node build.js

      # ── 5. Commit data.json if it changed ────────────────────────────────────
      #    Pull --rebase before push to survive concurrent workflow pushes.
      - name: Commit data.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --staged --quiet; then
            echo "ℹ️  No changes to data.json — skipping commit."
          else
            git commit -m "chore: refresh market snapshot [skip ci]"
            # Pull rebase to handle any concurrent pushes from other workflows
            git pull --rebase --autostash origin main || true
            git push
            echo "✅  data.json committed and pushed."
          fi
