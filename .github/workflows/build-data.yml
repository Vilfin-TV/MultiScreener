name: Build Daily Market Data

# ─── Schedule ────────────────────────────────────────────────────────────────
# Runs at 01:00 UTC daily (06:30 IST) — before Indian market open.
# The WORKER_URL secret is read here; it never touches any frontend file.
on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 06:30 IST, daily
  workflow_dispatch:        # manual trigger from Actions tab

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  build-data:
    name: Generate Market Snapshot → data.json
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Node.js 24 (native fetch built-in, no npm install required)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Verify WORKER_URL secret exists before running
      - name: Verify WORKER_URL secret
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "❌ ERROR: WORKER_URL secret is not set."
            echo ""
            echo "To fix:"
            echo "  1. Go to your repo → Settings → Secrets and variables → Actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: WORKER_URL"
            echo "  4. Value: https://x9-k2-p30-worker.vilfintv.workers.dev"
            exit 1
          fi
          echo "✅ WORKER_URL secret is present (value hidden)."

      # 4. Run build script — WORKER_URL injected from GitHub Secret.
      #    This is the ONLY place the Worker URL appears; it is never written
      #    to any file that gets deployed to GitHub Pages.
      - name: Run build script
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node build.js

      # 4. Commit data.json only if it changed
      - name: Commit data.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "No changes to data.json — skipping commit."
          else
            git add data.json
            git commit -m "chore: refresh market snapshot [skip ci]"
            git push
            echo "✅  data.json committed and pushed."
          fi
